<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입원환자 진료 도구 — 의료진용</title>
  <meta name="description" content="진단서 속 그 코드, 누구나 이해할 수 있게." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #F5F1E8;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    input { font-family: inherit; }
    .container-narrow, .max-w-4xl { max-width: 56rem; margin-left: auto; margin-right: auto; }
    .max-w-4xl { padding-left: 1.5rem; padding-right: 1.5rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .pt-12 { padding-top: 3rem; }
    .pb-8 { padding-bottom: 2rem; }
    .pb-12 { padding-bottom: 3rem; }
    .pb-16 { padding-bottom: 4rem; }
    .mb-8 { margin-bottom: 2rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div id="root">
    <div style="font-family: 'Noto Sans KR', sans-serif; padding: 60px 24px; max-width: 720px; margin: 0 auto; text-align: center; color: #6B6356;">
      <div style="font-family: 'Noto Serif KR', serif; font-size: 28px; color: #1F6E5C; font-weight: 700; margin-bottom: 16px;">불러오는 중…</div>
      <div style="font-size: 14px; line-height: 1.7;">잠시만 기다려 주세요.</div>
      <div id="error-display" style="display:none; margin-top: 24px; padding: 16px; background: #FFF5EE; border: 1px solid #B8501F; color: #B8501F; text-align: left; font-size: 13px; border-radius: 4px;"></div>
    </div>
  </div>

  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('error-display');
      if (box) {
        box.style.display = 'block';
        box.innerHTML = '<strong>오류 발생:</strong><br/>' + (e.message || '알 수 없는 오류') + '<br/><br/>페이지를 새로고침(F5)해 주세요.';
      }
    });
  </script>

function matchDiseases(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return DISEASES.filter(d => d.code.toLowerCase().includes(q) || d.name.includes(q) || d.english.toLowerCase().includes(q) || d.aliases.some(a => a.includes(q)));
}
function lookupByCode(code) {
  return DISEASES.find(d => d.code === code);
}
function isEmergency(q) {
  const lower = q.toLowerCase();
  return EMERGENCY_KEYWORDS.some(k => lower.includes(k));
}

function calcRiskScores(state) {
  const age = parseInt(state.age) || 0;
  let curb = state.curb.filter(Boolean).length;
  if (age >= 65) curb += 1;
  const qsofa = state.qsofa.filter(Boolean).length;
  let cci = 0;
  state.cci1.forEach(b => { if (b) cci += 1; });
  state.cci2.forEach(b => { if (b) cci += 2; });
  state.cci3.forEach(b => { if (b) cci += 3; });
  state.cci6.forEach(b => { if (b) cci += 6; });
  const ageBonus = getAgeBonus(age);
  const cciTotal = cci + ageBonus;
  const mdr = state.mdr.filter(Boolean).length;
  const mods = state.mods.filter(Boolean).length;
  const cfs = state.cfs;
  const news2 = calcNEWS2(state);

  const curbMortTable = [0.7, 2.1, 9.2, 14.5, 40, 57];
  const curbMort = curbMortTable[Math.min(curb, 5)];
  const qsofaMort = qsofa >= 2 ? 24 : (qsofa >= 1 ? 8 : 3);
  let surv10 = Math.round(Math.pow(0.983, Math.exp(cciTotal * 0.9)) * 100);
  if (surv10 < 0) surv10 = 0;
  const cfsMortTable = {1:3, 2:4, 3:7, 4:10, 5:15, 6:24, 7:34, 8:50, 9:70};
  const cfsMort1y = cfsMortTable[cfs] || null;
  let cciMort1y;
  if (cciTotal === 0) cciMort1y = 5;
  else if (cciTotal <= 2) cciMort1y = 12;
  else if (cciTotal <= 4) cciMort1y = 26;
  else if (cciTotal <= 6) cciMort1y = 52;
  else if (cciTotal <= 8) cciMort1y = 70;
  else cciMort1y = 85;
  const shortMort = Math.max(curbMort, qsofaMort);
  let longMort = cciMort1y;
  if (cfsMort1y) longMort = Math.max(longMort, cfsMort1y);

  let tier, tierLabel;
  if (curb >= 3 || qsofa >= 2 || cfs >= 8 || cciTotal >= 7 || (qsofa >= 1 && cfs >= 7) || news2.score >= 7) {
    tier = 'high'; tierLabel = '매우 고위험';
  } else if (curb === 2 || cfs >= 6 || cciTotal >= 5 || mods >= 3 || news2.score >= 5 || news2.single3) {
    tier = 'mod'; tierLabel = '중등도 위험';
  } else {
    tier = 'low'; tierLabel = '저위험';
  }
  const hasInput = curb > 0 || qsofa > 0 || cci > 0 || mdr > 0 || mods > 0 || cfs > 0 || age > 0 || news2.filled > 0;
  return { curb, qsofa, cci, cciTotal, ageBonus, cfs, mdr, mods, news2,
    curbMort, qsofaMort, surv10, cfsMort1y, cciMort1y,
    shortMort, longMort, tier, tierLabel, hasInput };
}
